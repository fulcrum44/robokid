<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Editor de bloques</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* ─── Variables de tema ─── */
      :root {
        --toolbar-bg: #1a1a2e;
        --toolbar-text: rgba(255,255,255,0.75);
        --toolbar-text-active: #1a1a2e;
        --tab-bg: rgba(255,255,255,0.06);
        --tab-hover: rgba(255,255,255,0.12);
        --tab-active: #f5f5f8;
        --flyout-bg: #16213e;
      }

      body.dark-theme {
        --toolbar-bg: #111127;
        --toolbar-text: rgba(255,255,255,0.65);
        --toolbar-text-active: #ffffff;
        --tab-bg: rgba(255,255,255,0.06);
        --tab-hover: rgba(255,255,255,0.12);
        --tab-active: #1e1e2f;
        --flyout-bg: #151528;
      }

      * { margin: 0; padding: 0; }
      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        font-family: 'Outfit', sans-serif;
      }

      #blocklyDiv {
        height: 100%;
        width: 100%;
      }

      .blocklyToolboxDiv {
        background: var(--toolbar-bg) !important;
        padding: 6px 6px 0 6px !important;
        height: auto !important;
        border: none !important;
      }
      .blocklyToolboxContents {
        display: flex !important;
        align-items: flex-end !important;
        gap: 3px !important;
        padding: 0 !important;
      }
      .blocklyTreeRow {
        padding: 8px 14px !important;
        margin: 0 !important;
        border-radius: 12px 12px 0 0 !important;
        background: var(--tab-bg) !important;
        border: none !important;
        height: auto !important;
        line-height: normal !important;
        transition: background 0.2s !important;
      }
      .blocklyTreeRow:hover {
        background: var(--tab-hover) !important;
      }
      .blocklyTreeSelected {
        background: var(--tab-active) !important;
      }
      .blocklyTreeSelected .blocklyTreeLabel {
        color: var(--toolbar-text-active) !important;
      }
      .blocklyTreeLabel {
        font-family: 'Outfit', sans-serif !important;
        font-size: 12px !important;
        font-weight: 600 !important;
        color: var(--toolbar-text) !important;
      }
      .blocklyTreeIcon {
        width: 8px !important;
        height: 8px !important;
        border-radius: 50% !important;
        margin-right: 5px !important;
      }
      .blocklyTreeRowContentContainer {
        display: flex !important;
        align-items: center !important;
      }
      .blocklyFlyoutBackground {
        fill: var(--flyout-bg) !important;
        fill-opacity: 0.95 !important;
      }
      .blocklyFlyoutScrollbar {
        fill: rgba(255,255,255,0.12) !important;
      }
      .blocklyZoom > image { opacity: 0.5; }
    </style>
  </head>
  <body>
    <div id="blocklyDiv"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
